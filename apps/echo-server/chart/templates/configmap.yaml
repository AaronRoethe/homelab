{{- if .Values.config.env }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "echo-server.fullname" . }}-env
  labels:
    {{- include "echo-server.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
