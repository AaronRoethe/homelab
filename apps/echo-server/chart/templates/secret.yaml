{{- if .Values.config.secret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echo-server.fullname" . }}-secret
  labels:
    {{- include "echo-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.config.secret }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
