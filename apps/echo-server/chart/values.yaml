replicaCount: 1

image:
  repository: registry.infra.svc.cluster.local:5000/echo-server
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: echo.homelab.local

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 32Mi

healthcheck:
  path: /healthz
  port: 8080

serviceAccount:
  create: true
