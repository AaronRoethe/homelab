replicaCount: 1

image:
  repository: ghcr.io/aaronroethe/echo-server
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: echo.homelab.local

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 32Mi

healthcheck:
  path: /healthz
  port: 8080

serviceAccount:
  create: true

canary:
  enabled: false
  image:
    tag: ""
  weight: 20
  replicaCount: 1

config:
  env:
    LOG_LEVEL: "info"
    PORT: "8080"
    READ_TIMEOUT: "5s"
    WRITE_TIMEOUT: "10s"
    IDLE_TIMEOUT: "60s"
    SHUTDOWN_TIMEOUT: "10s"
  secret: {}
