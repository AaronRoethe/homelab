apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "traffic-gen.fullname" . }}
  labels:
    {{- include "traffic-gen.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        {{- include "traffic-gen.selectorLabels" . | nindent 8 }}
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "traffic-gen.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: TARGET_URL
                  value: {{ .Values.traffic.targetURL | quote }}
                - name: REQUESTS
                  value: {{ .Values.traffic.requests | quote }}
                - name: CONCURRENCY
                  value: {{ .Values.traffic.concurrency | quote }}
                - name: DELAY_MS
                  value: {{ .Values.traffic.delayMs | quote }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
