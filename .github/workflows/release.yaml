name: Release

# Cut a stable release manually.
# Bumps version, creates a GitHub Release with changelog,
# builds images and pushes to GHCR.
# Kargo picks up the new stable tag → auto-promotes dev → staging.
# Prod promotion happens via PR (promote-prod.yaml).

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to release"
        required: true
        type: choice
        options:
          - echo-server
          - traffic-gen
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: minor
        options:
          - patch
          - minor
          - major

env:
  REGISTRY: ghcr.io/aaronroethe

jobs:
  release-echo-server:
    if: inputs.app == 'echo-server'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        working-directory: apps/echo-server
        run: go test -race -count=1 ./...

      - name: Determine release version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          LATEST=$(git tag -l 'echo-server/v*' --sort=-v:refname | grep -E '^echo-server/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST" ]; then
            case "$BUMP" in
              major) NEXT="1.0.0" ;;
              minor) NEXT="0.1.0" ;;
              patch) NEXT="0.0.1" ;;
            esac
          else
            VER="${LATEST#echo-server/v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            case "$BUMP" in
              major) NEXT="$((MAJOR + 1)).0.0" ;;
              minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "previous=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Release version: $NEXT (bump: $BUMP, previous: $LATEST)"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.previous }}"
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          {
            echo "changelog<<EOF"
            git log "$RANGE" --oneline --no-merges -- apps/echo-server/ | head -20
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push echo-server
        run: |
          docker build \
            -f apps/echo-server/Dockerfile \
            -t ${{ env.REGISTRY }}/echo-server:${{ steps.version.outputs.version }} \
            -t ${{ env.REGISTRY }}/echo-server:latest \
            .
          docker push ${{ env.REGISTRY }}/echo-server:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/echo-server:latest

      - name: Build and push E2E test image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/echo-server-e2e:latest \
            -f apps/echo-server/e2e/Dockerfile \
            apps/echo-server/
          docker push ${{ env.REGISTRY }}/echo-server-e2e:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: echo-server/v${{ steps.version.outputs.version }}
          name: echo-server v${{ steps.version.outputs.version }}
          body: |
            ## echo-server v${{ steps.version.outputs.version }}

            **Image:** `${{ env.REGISTRY }}/echo-server:${{ steps.version.outputs.version }}`

            ### What happens next
            1. Kargo Warehouse detects the new stable tag (~5 min)
            2. Auto-promotes to **dev** → verification runs
            3. Auto-promotes to **staging** → E2E test suite runs
            4. GH Action opens a PR for **prod** promotion → merge to deploy

            ### Changes since ${{ steps.version.outputs.previous || 'initial' }}
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```
          draft: false
          prerelease: false

  release-traffic-gen:
    if: inputs.app == 'traffic-gen'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run vet
        working-directory: apps/traffic-gen
        run: go vet ./...

      - name: Determine release version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          LATEST=$(git tag -l 'traffic-gen/v*' --sort=-v:refname | grep -E '^traffic-gen/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST" ]; then
            case "$BUMP" in
              major) NEXT="1.0.0" ;;
              minor) NEXT="0.1.0" ;;
              patch) NEXT="0.0.1" ;;
            esac
          else
            VER="${LATEST#traffic-gen/v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            case "$BUMP" in
              major) NEXT="$((MAJOR + 1)).0.0" ;;
              minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "previous=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Release version: $NEXT (bump: $BUMP, previous: $LATEST)"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.previous }}"
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          {
            echo "changelog<<EOF"
            git log "$RANGE" --oneline --no-merges -- apps/traffic-gen/ | head -20
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push traffic-gen
        run: |
          docker build \
            -f apps/traffic-gen/Dockerfile \
            -t ${{ env.REGISTRY }}/traffic-gen:${{ steps.version.outputs.version }} \
            -t ${{ env.REGISTRY }}/traffic-gen:latest \
            .
          docker push ${{ env.REGISTRY }}/traffic-gen:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/traffic-gen:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: traffic-gen/v${{ steps.version.outputs.version }}
          name: traffic-gen v${{ steps.version.outputs.version }}
          body: |
            ## traffic-gen v${{ steps.version.outputs.version }}

            **Image:** `${{ env.REGISTRY }}/traffic-gen:${{ steps.version.outputs.version }}`

            ### Changes since ${{ steps.version.outputs.previous || 'initial' }}
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```
          draft: false
          prerelease: false
