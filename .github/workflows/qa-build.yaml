name: QA Build

# Triggers on every merge to master. Detects which apps changed,
# builds dev prerelease images (X.Y.Z-dev.N), and pushes to GHCR.
# Kargo ignores prerelease tags — only stable releases trigger promotion.

on:
  push:
    branches: [master]
    paths:
      - "apps/**"

env:
  REGISTRY: ghcr.io/aaronroethe

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      echo-server: ${{ steps.changes.outputs.echo-server }}
      traffic-gen: ${{ steps.changes.outputs.traffic-gen }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            echo-server:
              - 'apps/echo-server/**'
              - 'apps/pkg/**'
            traffic-gen:
              - 'apps/traffic-gen/**'
              - 'apps/pkg/**'

  qa-echo-server:
    needs: detect-changes
    if: needs.detect-changes.outputs.echo-server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        working-directory: apps/echo-server
        run: go test -race -count=1 ./...

      - name: Determine next dev version
        id: version
        run: |
          # Find the latest stable release tag (no prerelease suffix)
          LATEST=$(git tag -l 'echo-server/v*' --sort=-v:refname | grep -E '^echo-server/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            BASE="0.1.0"
          else
            BASE="${LATEST#echo-server/v}"
          fi
          # Count commits since last stable tag for dev counter
          if [ -z "$LATEST" ]; then
            N=$(git rev-list --count HEAD -- apps/echo-server/ apps/pkg/)
          else
            N=$(git rev-list --count "${LATEST}..HEAD" -- apps/echo-server/ apps/pkg/)
          fi
          NEXT="${BASE}-dev.${N}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Dev version: $NEXT (base: $BASE, commits: $N)"

      - name: Build and push echo-server
        run: |
          docker build \
            -f apps/echo-server/Dockerfile \
            -t ${{ env.REGISTRY }}/echo-server:${{ steps.version.outputs.version }} \
            -t ${{ env.REGISTRY }}/echo-server:dev-latest \
            .
          docker push ${{ env.REGISTRY }}/echo-server:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/echo-server:dev-latest

      - name: Build and push E2E test image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/echo-server-e2e:latest \
            -f apps/echo-server/e2e/Dockerfile \
            apps/echo-server/
          docker push ${{ env.REGISTRY }}/echo-server-e2e:latest

      - name: Tag git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "echo-server/v${{ steps.version.outputs.version }}"
          git push origin "echo-server/v${{ steps.version.outputs.version }}"

      - name: Summary
        run: |
          echo "### QA Build: echo-server" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ env.REGISTRY }}/echo-server:${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Note:** Prerelease tag — Kargo will ignore this. Use Release workflow for stable versions." >> "$GITHUB_STEP_SUMMARY"

  qa-traffic-gen:
    needs: detect-changes
    if: needs.detect-changes.outputs.traffic-gen == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run vet
        working-directory: apps/traffic-gen
        run: go vet ./...

      - name: Determine next dev version
        id: version
        run: |
          LATEST=$(git tag -l 'traffic-gen/v*' --sort=-v:refname | grep -E '^traffic-gen/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            BASE="0.1.0"
          else
            BASE="${LATEST#traffic-gen/v}"
          fi
          if [ -z "$LATEST" ]; then
            N=$(git rev-list --count HEAD -- apps/traffic-gen/)
          else
            N=$(git rev-list --count "${LATEST}..HEAD" -- apps/traffic-gen/)
          fi
          NEXT="${BASE}-dev.${N}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Dev version: $NEXT (base: $BASE, commits: $N)"

      - name: Build and push traffic-gen
        run: |
          docker build \
            -f apps/traffic-gen/Dockerfile \
            -t ${{ env.REGISTRY }}/traffic-gen:${{ steps.version.outputs.version }} \
            -t ${{ env.REGISTRY }}/traffic-gen:dev-latest \
            .
          docker push ${{ env.REGISTRY }}/traffic-gen:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/traffic-gen:dev-latest

      - name: Tag git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "traffic-gen/v${{ steps.version.outputs.version }}"
          git push origin "traffic-gen/v${{ steps.version.outputs.version }}"

      - name: Summary
        run: |
          echo "### QA Build: traffic-gen" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ env.REGISTRY }}/traffic-gen:${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
