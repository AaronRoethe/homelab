apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
  labels:
    homelab/tier: platform
    homelab/app: kargo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: ghcr.io/akuity/kargo-charts
      targetRevision: "1.3.1"
      chart: kargo
      helm:
        valueFiles:
          - $values/platform/infra/kargo/values.yaml
    - repoURL: https://github.com/AaronRoethe/homelab
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
