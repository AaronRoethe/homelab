apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod-canary
  namespace: echo-server
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: echo-server
      sources:
        stages:
          - staging
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/AaronRoethe/homelab
            checkout:
              - branch: master
                path: ./src
        - uses: yaml-update
          as: update-canary
          config:
            path: ./src/platform/apps/demo/prod/echo-server.yaml
            updates:
              - key: spec.source.helm.valuesObject.canary.enabled
                value: true
              - key: spec.source.helm.valuesObject.canary.image.tag
                value: ${{ imageFrom("ghcr.io/aaronroethe/echo-server").Tag }}
        - uses: git-commit
          config:
            path: ./src
            messageFromSteps:
              - update-canary
        - uses: git-push
          as: push
          config:
            path: ./src
        - uses: argocd-update
          config:
            apps:
              - name: echo-server-prod
                sources:
                  - repoURL: https://github.com/AaronRoethe/homelab
                    desiredRevision: ${{ outputs.push.commit }}
