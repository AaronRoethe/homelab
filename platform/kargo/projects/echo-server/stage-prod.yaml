apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: echo-server
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: echo-server
      sources:
        stages:
          - staging
  verification:
    analysisTemplates:
      - name: echo-server-prod-verify
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/AaronRoethe/homelab
            checkout:
              - branch: master
                path: ./src
        - uses: yaml-update
          as: update-image
          config:
            path: ./src/platform/apps/demo/prod/echo-server.yaml
            updates:
              - key: spec.source.helm.valuesObject.image.tag
                value: ${{ imageFrom("registry.infra.svc.cluster.local:5000/echo-server").Tag }}
        - uses: git-commit
          config:
            path: ./src
            messageFromSteps:
              - update-image
        - uses: git-push
          config:
            path: ./src
        - uses: argocd-update
          config:
            apps:
              - name: echo-server-prod
                sources:
                  - repoURL: https://github.com/AaronRoethe/homelab
                    desiredRevision: ${{ outputs.steps['git-push'].commit }}
